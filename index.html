<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attendance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="login-card">

        <h2>👨 Employee Login</h2>

        <!-- STATUS -->
        <div class="status" id="status">
            <span id="statusText">Please Login</span>
            <span id="statusTime"></span>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm">

            <div class="input-group">
                <label>Employee ID</label>
                <input type="text" id="empId" placeholder="EMP001" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="******" required>
            </div>

            <!-- BUTTONS -->
            <button type="submit" id="loginBtn">Login</button>

            <button type="button" id="logoutBtn" style="display:none;">Logout</button>

            <button type="button" id="startBreakBtn" style="background:#ff9800;">
                Take Break ☕
            </button>

            <button type="button" id="endBreakBtn" style="background:#4caf50; display:none;">
                Back to Work ✅
            </button>

        </form>

        <!-- TODAY RECORD -->
        <div class="today-record" id="todayRecord" style="display:none;">
            <h3>Today's Record</h3>
            <div id="todayData"></div>
        </div>

    </div>
</div>

<!-- JS -->
<script src="database.js"></script>
<script src="script.js"></script>

<!-- FIXED JS BINDING -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("loginForm");
    const logoutBtn = document.getElementById("logoutBtn");
    const startBreakBtn = document.getElementById("startBreakBtn");
    const endBreakBtn = document.getElementById("endBreakBtn");

    // ✅ LOGIN FIXED
    if (form) {
        form.addEventListener("submit", function (e) {
            e.preventDefault();

            if (typeof handleLogin === "function") {
                handleLogin(e);
            }
        });
    }

    // ✅ LOGOUT FIXED
    if (logoutBtn) {
        logoutBtn.addEventListener("click", function () {
            if (typeof handleLogout === "function") {
                handleLogout();
            }
        });
    }

    // BREAK START
    if (startBreakBtn) {
        startBreakBtn.addEventListener("click", function () {
            if (typeof handleBreak === "function") {
                handleBreak("start_break");
            }
        });
    }

    // BREAK END
    if (endBreakBtn) {
        endBreakBtn.addEventListener("click", function () {
            if (typeof handleBreak === "function") {
                handleBreak("end_break");
            }
        });
    }

});
</script>

</body>
</html>
